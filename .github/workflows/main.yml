name: huluxia_signin
on:
  schedule:    # 定时触发
    - cron: '0 16 * * *'  # UTC16点 = 北京时间凌晨00:00（24点）
  workflow_dispatch:  # 支持手动触发
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: '初始化python环境'
        uses: actions/setup-python@v4
        with:
           python-version: 3.10.11
      - name: '安装依赖'
        run: |
          pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: '开始运行'
        id: signin-outputs
        env:
          # 邮箱账号配置（直接粘贴你的JSON）
          ACCOUNTS: |
            {
                "username": "616836@qq.com",
                "auth_code_or_password": "qqzaxjftraucbjig",
                "sender_email": "616836@qq.com",
                "recipient_email": "616836@qq.com"
            }
        run: |
          python ./main.py
